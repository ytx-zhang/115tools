user root;
worker_processes auto;
error_log /dev/stdout error;

events {
    worker_connections 1024;
}

http {
    proxy_cache_path /app/data/cache levels=1:2 keys_zone=115_vod:10m max_size=100g inactive=7d use_temp_path=off;
    limit_req_zone $arg_pickcode zone=global_115:1m rate=3r/s;

    server {
        listen 8081;
        resolver 223.5.5.5 valid=300s;
        resolver_timeout 5s;
        location / {
            proxy_set_header User-Agent "Fuck115";
            
            proxy_intercept_errors on;
            error_page 301 302 307 = @handle_redirect;

            proxy_pass http://127.0.0.1:8080;
        }

        location @handle_redirect {
            limit_req zone=global_115 burst=200;

            recursive_error_pages on;
            proxy_intercept_errors on;
            error_page 403 = @handle_redirect;

            slice 20m;
            proxy_cache 115_vod;
            proxy_cache_key "$arg_pickcode$slice_range";
            proxy_cache_valid 200 206 7d;

            proxy_cache_lock on;
            proxy_cache_lock_timeout 5s;
            proxy_cache_lock_age 60s;

            if ($upstream_http_location != "") {
                set $saved_url $upstream_http_location;
            }
            proxy_pass_request_headers off;
            proxy_set_header Range $slice_range;
            proxy_set_header User-Agent "Fuck115";

            proxy_pass $saved_url;
        }
    }
}