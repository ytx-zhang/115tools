name: Auto Build and Push Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 必须有 write 权限才能创建 Tag
      packages: write 

    steps:
      - name: Checkout code
        uses: actions/checkout@main
        with:
          fetch-depth: 0 # 必须拉取完整历史，否则无法计算版本号

      # --- 新增：自动生成版本号步骤 ---
      - name: Auto Tagging
        id: tag_version
        uses: anothrNick/github-tag-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WITH_V: true             # 标签带 v 前缀，如 v1.0.2
          DEFAULT_BUMP: patch      # 默认每次提交增加最后一位 (0.0.x)
          RELEASE_BRANCHES: main

      - name: Set up Go
        uses: actions/setup-go@main
        with:
          go-version: 'stable' 
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@master

      - name: Log in to GHCR
        uses: docker/login-action@master
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@master
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.tag_version.outputs.new_tag }} # 使用刚才生成的新标签
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@master
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max