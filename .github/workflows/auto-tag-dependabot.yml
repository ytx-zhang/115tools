name: Dependabot 合并后自动打版本标签

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump-version:
    runs-on: ubuntu-latest
    if: |
      github.event.head_commit.author.name == 'dependabot[bot]' ||
      contains(github.event.head_commit.message, 'Bump') ||
      contains(github.event.head_commit.message, 'dependabot')

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: 计算下一个 patch 版本
        run: |
          # 获取当前最新的 tag
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          if [ -z "$LATEST_TAG" ]; then
            NEW_TAG="v0.1.0"
          else
            # 去掉 v 前缀，拆出 major.minor.patch
            VERSION="${LATEST_TAG#v}"
            MAJOR=$(echo "$VERSION" | cut -d. -f1)
            MINOR=$(echo "$VERSION" | cut -d. -f2)
            PATCH=$(echo "$VERSION" | cut -d. -f3)
            NEW_PATCH=$((PATCH + 1))
            NEW_TAG="v${MAJOR}.${MINOR}.${NEW_PATCH}"
          fi
          echo "NEW_TAG=$NEW_TAG" >> $GITHUB_ENV
          echo "当前版本: $LATEST_TAG → 新版本: $NEW_TAG"

      - name: 打标签并推送
        run: |
          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"
